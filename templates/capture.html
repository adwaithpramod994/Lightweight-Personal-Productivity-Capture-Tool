{% extends "base.html" %}

{% block title %}Capture{% endblock %}
{% block page_title %}Capture Tasks{% endblock %}

{% block content %}

<div class="card">

    <h2 style="margin-bottom:10px;">Capture Notes</h2>

    <p style="color:#6B7280;margin-bottom:25px;">
        Enter tasks or notes in natural language. AI will extract actionable tasks.
    </p>

    <textarea rows="10"
    placeholder="Example:
Complete the AI project today.
Prepare for Java interview tomorrow.
Buy groceries in the evening."></textarea>

    <div style="margin-top:20px;display:flex;gap:15px;">

        <button class="btn" id="analyzeBtn">

            Analyze with AI

        </button>

        <button class="btn" style="background:#374151;">

            Clear

        </button>

    </div>

</div>

<div class="card" style="margin-top:25px;">

    <h3 style="margin-bottom:20px;">
        AI Output
    </h3>

    <div id="resultBox">

        <p style="color:#6B7280;">

            AI results will appear here after analysis.

        </p>

    </div>

</div>

{% endblock %}
